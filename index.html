<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema Geek</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Produtos Geek</h1>

    <button onclick="buscarProdutos()">
        Buscar Produtos
    </button>



    <h2>Adicionar Produto</h2>

    <input type="text" id="nomeProduto" placeholder="Nome do produto">
    <input type="number" id="precoProduto" placeholder="Preço">

    <button onclick="adicionarProduto()">
        Adicionar
    </button>



    <h2>Atualizar Produto</h2>

    <input type="number" id="idAtualizar" placeholder="ID">
    <input type="text" id="nomeAtualizar" placeholder="Novo nome">
    <input type="number" id="precoAtualizar" placeholder="Novo preço">

    <button onclick="atualizarProduto()">
        Atualizar
    </button>

    <h2>Deletar Produto</h2>

    <input type="number" id="idDeletar" placeholder="ID">

    <button onclick="deletarProduto()">
        Deletar
    </button>

    <ul id="listaProdutos"></ul>

    <script src="script.js"></script>










</body>
</html>
