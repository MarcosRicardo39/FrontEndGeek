<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   

    <div class="layout">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <h2>Admin</h2>
            <button onclick="voltarParaSite()">
                Voltar para Loja
            </button>

            <button onclick="mostrarProdutos()">Produtos</button>
            <button onclick="logout()">Sair</button>
        </div>

        <!-- CONTEÚDO -->
        <div class="content">

            <h1>Produtos</h1>

            <div class="form">
                <input type="text" id="nomeProduto" placeholder="Nome">
                <input type="number" id="precoProduto" placeholder="Preço">
                <input type="text" id="imagemProduto" placeholder="Imagem URL">

                <button onclick="adicionarProduto()">Adicionar</button>
            </div>

            <ul id="listaProdutos"></ul>

        </div>

    </div>

    <div id="modal" class="modal">

        <div class="modal-content">

            <h2>Editar Produto</h2>

            <input type="text" id="editNome" placeholder="Nome">
            <input type="number" id="editPreco" placeholder="Preço">
            <input type="text" id="editImagem" placeholder="Imagem URL">

            <button onclick="salvarEdicao()">Salvar</button>
            <button onclick="fecharModal()">Cancelar</button>

        </div>

    </div>

    <script src="adm.js"></script>

</body>
</html>
